name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install taplo
        shell: bash
        run: |
          if ! command -v taplo &> /dev/null; then
            curl -fsSL https://github.com/tamasfe/taplo/releases/latest/download/taplo-linux-x86_64.gz \
              | gzip -d - | install -m 755 /dev/stdin /usr/local/bin/taplo
          fi

      - name: Lint Cargo.toml
        shell: bash
        run: taplo lint Cargo.toml

      - name: Check Cargo.toml formatting
        shell: bash
        run: taplo fmt --check --option reorder_keys=true Cargo.toml

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install sakoku
        shell: bash
        run: cargo install sakoku --locked --version ^0.2

      - name: Check ASCII only (sakoku --strict)
        shell: bash
        run: sakoku --strict crates/

      - name: Check formatting
        shell: bash
        run: cargo fmt --all -- --check

      - name: Run cargo check
        shell: bash
        run: cargo check --workspace --all-features

      - name: Run tests
        shell: bash
        run: cargo test --workspace --all-features

      - name: Run clippy
        shell: bash
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings


  automerge:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request' && github.event.pull_request.user.login == 'renovate[bot]'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: automerge
        uses: pascalgn/automerge-action@7961b8b5eec56cc088c140b56d864285eabd3f67 # v0.16.4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MERGE_LABELS: "automerge"
